trigger:
- 'main'

variables:
  linkedinGamesRankingRepository: 'julescrevola/linkedin-games'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and push Docker image
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: Build and push to Docker Hub
      inputs:
        command: buildAndPush
        buildContext: $(Build.Repository.LocalPath)
        repository: $(linkedinGamesRankingRepository)
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: 'service-connection-docker'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to Scaleway
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: Deploy via SSH
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'linkedin_games_ranking'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: InstallSSHKey@0
            displayName: Install SSH key
            inputs:
              knownHostsEntry: $(SCALEWAY_KNOWN_HOSTS)
              sshKeySecureFile: 'scaleway_deploy_key'

          - script: |
              ssh $(SCALEWAY_USER)@$(SCALEWAY_HOST) bash -s <<'EOF'
                set -e
                cd ~/linkedin_games_ranking

                echo "Pulling latest image..."
                docker pull julescrevola/linkedin-games:latest

                echo "Creating Docker network (if needed)..."
                docker network inspect linkedin_games_ranking >/dev/null 2>&1 || \
                  docker network create linkedin_games_ranking

                echo "Restarting API container..."
                docker compose -f docker-compose.yml up -d --pull always

                echo "Restarting nginx..."
                docker compose -f nginx/docker-compose.yml up -d

                echo "✅ Deployment complete"
              EOF
