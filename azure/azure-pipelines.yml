trigger:
- 'main'

variables:
  buildConfiguration: 'Release'
  linkedinGamesRankingRepository: 'julescrevola/linkedin-games'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'secret'
  acaAppName: 'linkedin-games-ranking'
  ResourceGroup: 'rg-linkedin_games'
  acaEnvironment: 'aca-linkedin-games-ranking-env'
  acaTargetPort: '8501'

stages:
- stage: Build
  displayName: Build the containers
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: Build and push the linkedin-games image to Docker Hub
      inputs:
        command: buildAndPush
        buildContext: $(Build.Repository.LocalPath)
        repository: $(linkedinGamesRankingRepository)
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: 'service-connection-docker'
        tags: |
          $(tag)

    - publish: '$(Build.SourcesDirectory)'
      artifact: manifests

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'linkedin_games_ranking'
    variables:
    - group: Release
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: linkedin-games-ranking

          # AKS deployment steps kept as reference (disabled)
          # - script: |
          #     mkdir -p .streamlit
          #     cat <<EOF > .streamlit/secrets.toml
          #     SUPABASE_URL = "$(SUPABASE_URL)"
          #     SUPABASE_KEY = "$(SUPABASE_KEY)"
          #     EOF
          #   displayName: Create secrets.toml
          #
          # - task: AzureCLI@2
          #   displayName: Create Kubernetes secret
          #   inputs:
          #     azureSubscription: service-connection-linkedin-games-ranking
          #     scriptType: bash
          #     scriptLocation: inlineScript
          #     inlineScript: |
          #       az aks get-credentials \
          #         --resource-group rg-linkedin_games \
          #         --name linkedin_games_ranking \
          #         --overwrite-existing
          #
          #       kubectl create secret generic streamlit-secrets \
          #         --from-file=secrets.toml=.streamlit/secrets.toml \
          #         --dry-run=client -o yaml | kubectl apply -f -
          #
          # - task: KubernetesManifest@1
          #   displayName: Create imagePullSecret
          #   inputs:
          #     action: createSecret
          #     connectionType: azureResourceManager
          #     secretName: $(imagePullSecret)
          #     dockerRegistryEndpoint: 'service-connection-docker'
          #     azureSubscriptionConnection: 'service-connection-linkedin-games-ranking'
          #     azureResourceGroup: 'rg-linkedin_games'
          #     kubernetesCluster: 'linkedin_games_ranking'
          #     namespace: 'default'
          #
          # - task: KubernetesManifest@1
          #   displayName: Deploy to Kubernetes cluster
          #   inputs:
          #     action: deploy
          #     connectionType: azureResourceManager
          #     azureSubscriptionConnection: 'service-connection-linkedin-games-ranking'
          #     azureResourceGroup: 'rg-linkedin_games'
          #     kubernetesCluster: 'linkedin_games_ranking'
          #     namespace: 'default'
          #     manifests: |
          #       $(Pipeline.Workspace)/manifests/deployment.yaml
          #     imagePullSecrets: |
          #       $(imagePullSecret)
          #     containers: |
          #       $(RegistryName)/$(linkedinGamesRankingRepository):$(tag)

          - task: AzureCLI@2
            displayName: Deploy to Azure Container Apps
            inputs:
              azureSubscription: service-connection-linkedin-games-ranking
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az extension add --name containerapp --upgrade

                APP_NAME="$(acaAppName)"
                RESOURCE_GROUP="$(ResourceGroup)"
                ENVIRONMENT_NAME="$(acaEnvironment)"
                TARGET_PORT="$(acaTargetPort)"
                IMAGE="$(linkedinGamesRankingRepository):$(tag)"

                if az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
                  az containerapp secret set \
                    --name "$APP_NAME" \
                    --resource-group "$RESOURCE_GROUP" \
                    --secrets supabase-url="$(SUPABASE_URL)" supabase-key="$(SUPABASE_KEY)"

                  az containerapp update \
                    --name "$APP_NAME" \
                    --resource-group "$RESOURCE_GROUP" \
                    --image "$IMAGE" \
                    --set-env-vars SUPABASE_URL=secretref:supabase-url SUPABASE_KEY=secretref:supabase-key
                else
                  az containerapp create \
                    --name "$APP_NAME" \
                    --resource-group "$RESOURCE_GROUP" \
                    --environment "$ENVIRONMENT_NAME" \
                    --image "$IMAGE" \
                    --ingress external \
                    --target-port "$TARGET_PORT" \
                    --cpu 0.5 \
                    --memory 1.0Gi \
                    --min-replicas 0 \
                    --max-replicas 1 \
                    --secrets supabase-url="$(SUPABASE_URL)" supabase-key="$(SUPABASE_KEY)" \
                    --env-vars SUPABASE_URL=secretref:supabase-url SUPABASE_KEY=secretref:supabase-key
                fi
