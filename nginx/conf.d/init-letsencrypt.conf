# Temporary HTTP-only config for initial certificate issuance.
# Use this FIRST, get your certs, then switch to app.conf.
#
# Usage:
#   1. Rename this to app.conf (replace the HTTPS version temporarily)
#   2. Start nginx: docker-compose up -d nginx
#   3. Run certbot:
#      docker-compose run --rm certbot certonly --webroot -w /var/www/certbot \
#        -d linkedin-games-ranking.com --agree-tos -m your-email@example.com
#   4. Restore app.conf (the HTTPS version)
#   5. Restart nginx: docker-compose restart nginx

server {
    listen 80;
    server_name linkedin-games-ranking.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Certbot pending...';
        add_header Content-Type text/plain;
    }
}
