name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  IMAGE_NAME: julescrevola/linkedin-games
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run basic validation
        run: |
          python -m compileall .

  deploy:
    name: Deploy to Scaleway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          platforms: linux/amd64

      - name: Deploy to Scaleway via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key: ${{ secrets.SCALEWAY_SSH_KEY }}
          script: |
            set -e
            # Clone/update repo
            if [[ -d ~/linkedin_games_ranking ]]; then
                echo "▶ Pulling latest code..."
                cd ~/linkedin_games_ranking && git pull
            else
                echo "▶ Cloning repository..."
                git clone https://github.com/julescrevola/linkedin_games_ranking.git ~/linkedin_games_ranking && cd ~/linkedin_games_ranking
            fi

            echo "Pulling latest image..."
            docker pull julescrevola/linkedin-games:latest

            echo "Creating Docker network (if needed)..."
            docker network inspect linkedin_games_ranking >/dev/null 2>&1 || \
              docker network create linkedin_games_ranking

            echo "Restarting API container..."
            docker compose -f docker-compose.yml up -d --pull always

            echo "Starting nginx (auto-generates dummy cert if needed)..."
            docker compose -f nginx/docker-compose.yml up -d

            DOMAIN=$(grep -oP '(?<=server_name )[\w.-]+' nginx/conf.d/app.conf | head -1)
            CERT_FILE="nginx/ssl/live/$DOMAIN/fullchain.pem"

            if [[ -f "$CERT_FILE" ]] && \
               ! openssl x509 -in "$CERT_FILE" -subject -noout 2>/dev/null | grep -q "CN=localhost"; then
                echo "✅ Valid SSL certificate found."
            else
                echo "Requesting SSL certificate for $DOMAIN..."
                sleep 3
                if [[ -f "$CERT_FILE" ]] && \
                   openssl x509 -in "$CERT_FILE" -subject -noout 2>/dev/null | grep -q "CN=localhost"; then
                    rm -rf "nginx/ssl/live/$DOMAIN" "nginx/ssl/archive/$DOMAIN" "nginx/ssl/renewal/$DOMAIN.conf"
                fi
                docker compose -f nginx/docker-compose.yml run --rm certbot certonly \
                    --webroot -w /var/www/certbot \
                    -d "$DOMAIN" \
                    --agree-tos \
                    -m "admin@$DOMAIN" \
                    --non-interactive
                docker compose -f nginx/docker-compose.yml restart nginx
            fi

            echo "✅ Deployment complete"

